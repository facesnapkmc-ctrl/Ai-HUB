version: "2"
type: frontend
tech_stack:
  - React
  - TypeScript
  - Vite
  - React Router DOM
  - Supabase
  - Lucide React
  - Three.js
routes:
  - path: /
    file: src/App.tsx
    auth_required: false
    description: Home screen
  - path: /explore
    file: src/App.tsx
    auth_required: false
    description: Explore screen for AI prompts
  - path: /details/:id
    file: src/App.tsx
    auth_required: true
    description: Details screen for a prompt
  - path: /library
    file: src/App.tsx
    auth_required: true
    description: User library
  - path: /dashboard
    file: src/App.tsx
    auth_required: true
    description: User dashboard
  - path: /create
    file: src/App.tsx
    auth_required: true
    description: Create new prompt
  - path: /settings
    file: src/App.tsx
    auth_required: true
    description: Settings root
  - path: /settings/edit-profile
    file: src/App.tsx
    auth_required: true
    description: Edit user profile
  - path: /settings/subscription
    file: src/App.tsx
    auth_required: true
    description: Subscription settings
  - path: /settings/billing
    file: src/App.tsx
    auth_required: true
    description: Billing details
  - path: /settings/theme
    file: src/App.tsx
    auth_required: true
    description: Theme settings
  - path: /login
    file: src/App.tsx
    auth_required: false
    description: User login screen
  - path: /admin
    file: src/App.tsx
    auth_required: true
    description: Admin screen
features:
  - name: User Authentication
    description: Login and signout using Supabase auth
    files:
      - src/App.tsx
    entry_route: /login
    user_interactions:
      - View login screen
      - Authenticate with Supabase
      - Click Sign out
    api_calls: []
  - name: Explore Prompts
    description: Explore marketplace for AI prompts
    files:
      - src/App.tsx
    entry_route: /explore
    user_interactions:
      - View prompts
      - Search prompts
    api_calls: []
known_limitations: []
